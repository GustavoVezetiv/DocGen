version: '3.9'

services:
  # ============================================
  # DocGen API - Fase 1 (Stateless Motor)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docgen_api
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=*
      - MAX_PAYLOAD_SIZE=1048576
      - ENVIRONMENT=development
      - DEBUG=True
    volumes:
      - .:/app  # Hot reload em desenvolvimento
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - docgen_network

  # ============================================
  # PostgreSQL - Fase 2 (Persistência)
